<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>深灰卡片布局 Demo</title>
  <style>
    :root {
      --bg: #0a0d11;
      --surface: #171b21;
      --surface-2: #1b2027;
      --surface-3: #20262e;
      --frame: #2f3741;
      --frame-light: #4d5766;
      --shadow: rgba(0, 0, 0, 0.46);
      --text: #ecf0f4;
      --muted: #9ea8b4;
      --accent: #c8d1dc;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.05), transparent 28%),
        linear-gradient(180deg, #0e1217, var(--bg));
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      width: min(920px, calc(100vw - 32px));
      display: grid;
      gap: 18px;
    }

    .header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      padding: 0 4px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0.01em;
    }

    .header p {
      margin: 0;
      max-width: 420px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      text-align: right;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      min-height: 186px;
      border-radius: 22px;
      background: var(--surface);
      border: 1px solid var(--frame);
      box-shadow:
        inset 1px 1px 0 0 var(--frame-light),
        0 18px 30px var(--shadow);
    }

    .card__top {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--frame);
      border-radius: 22px 22px 0 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--frame);
      background: var(--surface-3);
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #cfd6df;
    }

    .card__body {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .bar-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: var(--surface-3);
      border: 1px solid var(--frame);
      flex: 1;
    }

    .bar.wide { flex: 1.8; }
    .bar.narrow { flex: 0.9; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 760px) {
      .header {
        flex-direction: column;
        align-items: start;
      }

      .header p {
        text-align: left;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="深灰卡片布局 demo">
    <section class="header">
      <div>
        <h1>深灰卡片布局</h1>
      </div>
      <p>上边和左边用 inset box-shadow 做亮色高光，下边和右边保持暗色边框，圆角自然过渡。</p>
    </section>

    <section class="grid">
      <article class="card">
        <div class="card__top">
          <span class="badge"><span class="dot"></span>Overview</span>
          <span class="badge">01</span>
        </div>
        <div class="card__body">
          <h2 class="title">模块一</h2>
          <p class="desc">卡片内部保持同一深灰面，只有外框颜色与阴影表达层级。</p>
          <div class="bar-row">
            <div class="bar wide"></div>
            <div class="bar narrow"></div>
          </div>
          <div class="footer">
            <span>状态：稳定</span>
            <span>深度：中</span>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card__top">
          <span class="badge"><span class="dot"></span>Detail</span>
          <span class="badge">02</span>
        </div>
        <div class="card__body">
          <h2 class="title">模块二</h2>
          <p class="desc">边框只用单一颜色，不做沿边延展方向的渐变处理，符合 9patch 的限制。</p>
          <div class="bar-row">
            <div class="bar narrow"></div>
            <div class="bar wide"></div>
          </div>
          <div class="footer">
            <span>状态：处理中</span>
            <span>深度：高</span>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card__top">
          <span class="badge"><span class="dot"></span>Panel</span>
          <span class="badge">03</span>
        </div>
        <div class="card__body">
          <h2 class="title">模块三</h2>
          <p class="desc">规整的横平竖直布局更适合做信息分组，读起来也更像真实面板。</p>
          <div class="bar-row">
            <div class="bar wide"></div>
            <div class="bar wide"></div>
          </div>
          <div class="footer">
            <span>状态：可用</span>
            <span>深度：中</span>
          </div>
        </div>
      </article>

      <article class="card">
        <div class="card__top">
          <span class="badge"><span class="dot"></span>Layout</span>
          <span class="badge">04</span>
        </div>
        <div class="card__body">
          <h2 class="title">模块四</h2>
          <p class="desc">高光在上边和左边，圆角处自然弯曲过渡，下边和右边不加高光。</p>
          <div class="bar-row">
            <div class="bar narrow"></div>
            <div class="bar narrow"></div>
            <div class="bar wide"></div>
          </div>
          <div class="footer">
            <span>状态：待接入</span>
            <span>深度：低</span>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
